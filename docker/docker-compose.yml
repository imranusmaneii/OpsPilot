services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opspilot-postgres
    environment:
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot
      POSTGRES_DB: opspilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opspilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: opspilot-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://opspilot:opspilot@postgres:5432/opspilot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEBUG: "true"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - upload_data:/app/uploads

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: opspilot-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: opspilot-celery
    command: celery -A app.workers.celery_app worker -l info -c 2
    environment:
      DATABASE_URL: postgresql+asyncpg://opspilot:opspilot@postgres:5432/opspilot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  test:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: opspilot-test
    command: pytest tests/ -v --cov=app
    environment:
      DATABASE_URL: postgresql+asyncpg://opspilot:opspilot@postgres:5432/opspilot_test
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: test-secret
      OPENAI_API_KEY: sk-test
    profiles:
      - test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  upload_data:
