services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_ECHO: "true"
      LOG_LEVEL: DEBUG
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ../frontend/src:/app/src
    command: npm run dev
